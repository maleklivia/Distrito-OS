<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distrito OS — Login</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 00-7 7c0 4 3 6 5 9h4c2-3 5-5 5-9a7 7 0 00-7-7z"/>
          <path d="M9 17h6M10 20h4"/>
        </svg>
      </div>
      <h1 class="login-title display">Distrito OS</h1>
      <p class="login-subtitle">Sistema de Gestão — Delivery</p>
    </div>

    <form class="login-form" id="login-form" novalidate>
      <div id="login-error" class="login-error hidden">
        Usuário ou senha incorretos. Tente novamente.
      </div>
      <div class="form-group">
        <label class="form-label" for="username">Usuário</label>
        <input class="form-input" type="text" id="username" name="username"
          placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input class="form-input" type="password" id="password" name="password"
          placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary login-submit" id="login-btn">
        Entrar
      </button>
    </form>

    <p class="login-footer">
      <span>Distrito XVII</span> &middot; Petiscos &amp; Caldos Premium
    </p>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script>
    if (Storage.isAuthenticated()) { window.location.href = 'pages/dashboard.html'; }
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.classList.add('btn-loading'); btn.disabled = true;
      err.classList.add('hidden');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      setTimeout(() => {
        if (Storage.login(u, p)) {
          window.location.href = 'pages/dashboard.html';
        } else {
          err.classList.remove('hidden');
          btn.classList.remove('btn-loading'); btn.disabled = false;
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 500);
    });
  </script>
</body>
</html>
